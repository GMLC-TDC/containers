# C/C++ with GCC
# Build your C/C++ project with GCC using make.
# Add steps that publish test results, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/c-cpp/gcc
# copied from https://github.com/CLIUtils/CLI11

trigger:
  - main

pr:
  - main

variables:
  containers.std: 20
  containers.build_type: Debug
  containers.options: -DGMLC_CONTAINERS_TEST=ON -DGMLC_CONTAINERS_ENABLE_ERROR_ON_WARNINGS=ON
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  - job: ClangTidy
    variables:
      CXX_FLAGS: "-Werror -Wcast-align -Wfloat-equal -Wimplicit-atomic-properties -Wmissing-declarations -Woverlength-strings -Wshadow -Wstrict-selector-match -Wundeclared-selector -Wunreachable-code -std=c++20"
      containers.options: -DGMLC_CONTAINERS_CLANG_TIDY=ON -DGMLC_CONTAINERS_CLANG_TIDY_OPTIONS="-fix"
      containers.std: 20
      CMAKE_BUILD_PARALLEL_LEVEL: 1
    pool:
      vmImage: "ubuntu-latest"
    container: helics/buildenv:clang19-builder
    steps:
      - template: .ci/azure-build.yml
      - script: git diff --exit-code --color
        displayName: Check tidy

  - job: CppLint
    variables:
      containers.options:
    pool:
      vmImage: "ubuntu-latest"
    container: helics/buildenv:cpplint
    steps:
      - bash: cpplint --counting=detailed --recursive gmlc tests benchmarks --exclude optional.hpp
        displayName: Checking against google style guide

  - job: Native
    strategy:
      matrix:
        Linux20:
          vmImage: "ubuntu-latest"
        macOS-latest:
          vmImage: "macOS-latest"
          containers.std: 23
        Windowslatest:
          vmImage: "windows-latest"
          containers.std: 20
          containers.options: -DGMLC_CONTAINERS_INCLUDE_BOOST=OFF
    pool:
      vmImage: $(vmImage)
    steps:
      - template: .ci/azure-build.yml
      - template: .ci/azure-test.yml

  - job: Docker
    pool:
      vmImage: "ubuntu-latest"
    strategy:
      matrix:
        gcc14:
          containerImage: helics/buildenv:gcc14-builder
        gcc15:
          containerImage: helics/buildenv:gcc15-builder
          containers.std: 26
        gcc12:
          containerImage: helics/buildenv:gcc12-builder
          containers.std: 23
        clang19:
          containerImage: helics/buildenv:clang19-builder
        clang22:
          containerImage: helics/buildenv:clang22-builder
          containers.std: 26
    container: $[ variables['containerImage'] ]
    steps:
      - template: .ci/azure-build.yml
      - template: .ci/azure-test.yml
