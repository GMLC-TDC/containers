name: Coverage
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        std: ["20", "23", "26"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Get LCov
        run: sudo apt-get install ca-certificates lcov

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DGMLC_CONTAINERS_TEST=ON \
            -DGMLC_CONTAINERS_BENCHMARK=OFF \
            -DCMAKE_BUILD_TYPE=Coverage

      - name: Build
        run: cmake --build build -j4

      - name: Test
        run: |
          cd build
          ctest --output-on-failure

      - name: Prepare coverage
        run: |
          lcov --ignore-errors gcov,mismatch,negative --directory . --capture --output-file coverage.info
          lcov --ignore-errors gcov,mismatch,negative --remove coverage.info '*/tests/*' '*gtest*' '*benchmark*' --output-file coverage.info
          lcov --list coverage.info
        working-directory: build

      - uses: codecov/codecov-action@v5
        with:
          files: build/coverage.info
          fail_ci_if_error: true
          functionalities: fixes
          token: ${{ secrets.CODECOV_TOKEN }}
