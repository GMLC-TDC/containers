name: Thread Sanitizer

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tsan:
    name: TSan
    runs-on: ubuntu-latest
    container:
      image: helics/buildenv:sanitizers-19

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_COMPILER=clang
          -DGMLC_CONTAINERS_BENCHMARK=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=thread -nostdinc++ -nostdlib++ -L/root/develop/libcxx_tsan/lib -lc++ -lc++abi -I/root/develop/libcxx_tsan/include -I/root/develop/libcxx_tsan/include/c++/v1 -Wno-unused-command-line-argument -Wno-reserved-identifier -Wno-reserved-macro-identifier -fno-omit-frame-pointer -g -O1 -Wl,-rpath,/root/develop/libcxx_tsan/lib"

      - name: Build
        run: cmake --build build --parallel 4

      - name: Test
        working-directory: build
        run: TSAN_OPTIONS="second_deadlock_stack=1 suppressions=$PWD/../config/tsan_suppression.txt history_size=4" ctest --verbose
